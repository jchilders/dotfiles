add_newline = true

# For git_status:
#   !   Modified
#   ✘   Deleted
#   ⇡   Ahead
#   ⇣   Behind
#   +   Staged
#   $   Stashed changes
format = """
$directory($git_branch)($git_status)$python$ruby
$character """

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[python]
format = " [venv:$virtualenv]($style)"
style = "bold blue"
detect_extensions = []
detect_files = []
detect_folders = []
detect_env_vars = ["VIRTUAL_ENV"]
